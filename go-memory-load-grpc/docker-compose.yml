services:
  api:
    build:
      context: .
    container_name: load-test-grpc-api
    environment:
      APP_HTTP_PORT: "8080"
      APP_GRPC_PORT: "50051"
    ports:
      - "8080:8080"
      - "50051:50051"

  k6:
    image: grafana/k6:0.49.0
    profiles: ["loadtest"]
    environment:
      GRPC_ADDR: api:50051
    volumes:
      - ./loadtest:/scripts:ro
      - ./api/proto:/proto:ro
    depends_on:
      api:
        condition: service_started
    entrypoint: ["k6"]
