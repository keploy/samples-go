services:
  db:
    image: mongo:7
    container_name: load-test-mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    container_name: load-test-mongo-api
    environment:
      APP_PORT: "8080"
      MONGO_URI: mongodb://db:27017/orderdb
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  k6:
    image: grafana/k6:0.49.0
    profiles: ["loadtest"]
    environment:
      BASE_URL: http://api:8080
    volumes:
      - ./loadtest:/scripts:ro
    depends_on:
      api:
        condition: service_started
    entrypoint: ["k6"]

volumes:
  mongo_data:
