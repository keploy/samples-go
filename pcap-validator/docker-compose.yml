services:
  api:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      HTTPS_ADDR: ":8443"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/pcapdemo?sslmode=disable"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DATABASE: "pcapdemo"
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pcapdemo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pcapdemo"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20
