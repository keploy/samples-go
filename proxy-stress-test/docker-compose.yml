services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: repro
      POSTGRES_PASSWORD: repro
      POSTGRES_DB: reprodb
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repro -d reprodb"]
      interval: 2s
      timeout: 5s
      retries: 10

  proxy:
    image: vimagick/tinyproxy:latest
    ports:
      - "127.0.0.1:3128:3128"
    command: >
      sh -c "echo 'Port 3128' > /tmp/tp.conf &&
             echo 'Listen 0.0.0.0' >> /tmp/tp.conf &&
             echo 'Timeout 300' >> /tmp/tp.conf &&
             echo 'MaxClients 100' >> /tmp/tp.conf &&
             echo 'Allow 172.16.0.0/12' >> /tmp/tp.conf &&
             echo 'ConnectPort 443' >> /tmp/tp.conf &&
             tinyproxy -d -c /tmp/tp.conf"

  app:
    build: .
    container_name: proxyStressApp
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: "postgres://repro:repro@db:5432/reprodb?sslmode=disable"
      HTTPS_TARGET: "https://httpbin.org/get"
      HTTP_PROXY_URL: "http://proxy:3128"
      # 20 concurrent HTTPS connections through CONNECT tunnel.
      # Exercises TLS cert caching (same code path as production 42).
      CONCURRENT_CONNS: "20"
      BATCH_SIZE: "20"
      # OTel ENABLED with no collector — validates the error drain fix.
      # Without the drain, OTel mock-not-found errors fill the 100-slot
      # channel and cause the replay to hang. With the drain, replay
      # completes normally.
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "localhost:4318"
      OTEL_EXPORT_INTERVAL: "1s"
      # Background noise: 1 conn/sec generates additional mock-not-found
      # errors between tests, exercising the error drain under load.
      BG_NOISE_CONNS: "1"
    depends_on:
      db:
        condition: service_healthy
    # Resource limits for GitHub Actions ubuntu-latest (4 vCPU / 16GB).
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
