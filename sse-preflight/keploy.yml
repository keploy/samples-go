# Minimal config for this repro.
# Notes:
# - `test.port` is the normal HTTP listener (:8000).
# - `test.ssePort` is the SSE listener (:8047).
#
# The bug repro is that an OPTIONS preflight recorded on :8047 gets replayed on :8000.

path: ""
appId: 0
appName: "sse-preflight"
command: "go run ./cmd/server"
templatize:
  testSets: []
port: 8000
proxyPort: 16789
incomingProxyPort: 36789
dnsPort: 26789
debug: true
disableANSI: false
disableTele: false
generateGithubActions: false
containerName: ""
networkName: ""
buildDelay: 5

test:
  selectedTests: {}
  ignoredTests: {}
  globalNoise:
    global: {}
    test-sets: {}
  replaceWith:
    global: {}
    test-sets: {}
  delay: 1
  host: "localhost"
  port: 8000
  grpcPort: 0
  ssePort: 8047
  protocol:
    http:
      port: 0
    grpc:
      port: 0
    sse:
      port: 0
  apiTimeout: 5
  skipCoverage: true
  coverageReportPath: ""
  ignoreOrdering: true
  mongoPassword: "default@123"
  language: ""
  removeUnusedMocks: false
  fallBackOnMiss: false
  jacocoAgentPath: ""
  basePath: ""
  mocking: true
  disableLineCoverage: true
  disableMockUpload: true
  useLocalMock: false
  updateTemplate: false
  mustPass: false
  maxFailAttempts: 1
  maxFlakyChecks: 1
  protoFile: ""
  protoDir: ""
  protoInclude: []
  compareAll: false
  updateTestMapping: false
  dedup: false
  freezeTime: false
  fuzzyMatch: false

record:
  recordTimer: 0s
  filters: []
  sync: false

configPath: ""
bypassRules: []
disableMapping: true
contract:
  driven: "consumer"
  mappings:
    servicesMapping: {}
    self: "s1"
  services: []
  tests: []
  path: ""
  download: false
  generate: false
inCi: false
cmdType: "native"
enableTesting: false
inDocker: false
keployContainer: "keploy-v3"
keployNetwork: "keploy-network"
